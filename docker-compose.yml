services:
  muse:
    image: ghcr.io/nanashithenameless/muse:latest
    restart: unless-stopped
    volumes:
      - ./data:/data
      # Uncomment when YT_DLP_COOKIES_PATH=/cookies.txt is set in .env.
      # yt-dlp may refresh cookies, so this must be writable.
      - ./cookies.txt:/cookies.txt
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DATABASE_URL: "file:/data/prisma.db"
