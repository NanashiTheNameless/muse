services:
  gluetun:
    image: qmcgaw/gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: "${PROTONVPN_WG_PRIVATE_KEY}"
      SERVER_COUNTRIES: United States

  muse:
    image: ghcr.io/nanashithenameless/muse:latest
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ./data:/data
      - ./cookies.txt:/run/secrets/youtube-cookies.txt:ro
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DATABASE_URL: "file:/data/prisma.db"
      YT_DLP_COOKIES_PATH: "/run/secrets/youtube-cookies.txt"
      YT_DLP_AUTO_UPDATE: "true"
