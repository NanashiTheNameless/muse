services:
  muse:
    build:
      context: .
      cache_from:
        - type=local,src=.docker-build-cache
      cache_to:
        - type=local,dest=.docker-build-cache,mode=max
    image: muse:local
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      DATA_DIR: /data
